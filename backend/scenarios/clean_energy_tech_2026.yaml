scenario:
  name: Clean Energy Technology 2026
  name_zh: 清洁能源技术 2026
  industry_label: Clean Energy Technology
  industry_label_zh: 清洁能源技术
  description: |-
    Manage a global clean energy technology company specializing in battery cells, energy storage systems, and renewable energy components. Navigate the most geopolitically charged supply chain on earth — where technology sovereignty, government subsidies, trade restrictions, and certification requirements determine market access. Compete against AI rivals and earn the confidence of institutional investors, government agencies, and industrial customers across 5 global markets.
  description_zh: |-
    管理一家专注于电池电芯、储能系统和可再生能源组件的全球清洁能源科技公司。驾驭全球地缘政治色彩最浓的供应链——技术主权、政府补贴、贸易壁垒和认证要求决定着市场准入。与AI竞争对手展开较量，赢得机构投资者、政府机构和工业客户在5个全球市场中的信任。
  num_rounds: 10
  round_duration_label: Quarter
  round_duration_label_zh: 季度
  starting_cash: '60000000.00'
  currency_code: USD
  max_platforms_per_team: 3
  max_products_per_platform: 3
  max_products_total: 6
  performance_index_base: '55.00'
  is_active: true
  company_names:
    - Helios Energy
    - Solaris Power
    - Vertex Clean Tech
    - Nexus Renewables
    - Aether Energy Systems
    - Prism Solar
    - Quantum Green
    - Zenith Energy
    - Eclipse Power
    - Catalyst Energy
    - Meridian Renewables
    - Titan Batteries
    - Cobalt Energy Solutions
    - Nova Power Systems
    - Helix Storage
    - Stratos Energy
