  description: |-
    Next-generation platform incorporating LMFP cathodes and solid-state hybrid electrolytes. Unlocks solid-state technology and smart battery management. Required to compete for Aerospace and premium applications.
  description_zh: |-
    融合LMFP正极材料和固态混合电解质的下一代平台。解锁固态技术和智能电池管理。参与航空航天和高端应用竞争的必要条件。
