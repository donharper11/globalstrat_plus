    Commit to a diverse board of directors including gender, ethnic, and international representation. Requires ongoing investment in board recruitment and advisory services.
  description_zh: |-
    承诺建设多元化的董事会，包括性别、种族和国际代表性。需要持续投资董事招聘和顾问服务。
  ongoing_cost_per_round: 200000
  benefits:
  - target: governance_quality
    boost: 0.2
  - target: esg_investor_satisfaction
    boost: 0.15
  - target: regulator_satisfaction
    boost: 0.08
    markets:
    - eu
    - na
  interactions: []
  revocation_penalty:
    duration_rounds: 2
    investor_confidence_drop: -0.1
    esg_investor_extra_penalty: -0.15
    regulator_penalty: -0.05
    news_headline: reverses board diversity commitment — governance concerns mount
  prerequisite:
  amplifier:
  display_order: 1
- code: pay_transparency
  name: Pay Transparency
  name_zh: 薪酬透明
  description: |-
    Publish compensation data across all levels. Builds trust but exposes any pay gaps. If salaries are below market rate, transparency will temporarily increase turnover until compensation is competitive.
  description_zh: |-
    公开所有层级的薪酬数据。建立信任但暴露薪酬差距。如果工资低于市场水平，透明化将暂时增加人员流失，直到薪酬具有竞争力。
  ongoing_cost_per_round: 150000
  benefits:
  - target: governance_quality
    boost: 0.15
  - target: talent_turnover_reduction
    boost: 0.03
  - target: esg_investor_satisfaction
    boost: 0.08
  - target: regulator_satisfaction
    boost: 0.05
  interactions:
  - condition:
      attribute: salary_level_any_pool
      operator: <
      value: 2
    effect:
      type: talent_turnover_increase
      magnitude: 0.05
      duration: while_condition_true
      description: Pay transparency exposes below-market salaries — turnover increases until compensation is competitive
  revocation_penalty:
    duration_rounds: 2
    investor_confidence_drop: -0.08
    talent_turnover_spike: 0.04
    news_headline: ends pay transparency program — employee trust shaken
  prerequisite:
  amplifier:
  display_order: 2
- code: anti_corruption
  name: Anti-Corruption
  name_zh: 反腐败
  description: |-
    Implement comprehensive anti-corruption program: compliance officers, whistleblower systems, third-party auditing, and zero-tolerance policy. Reduces regulatory event risk but increases JV operating costs.
  description_zh: |-
    实施全面的反腐败项目：合规官、举报人制度、第三方审计和零容忍政策。降低监管事件风险但增加合资运营成本。
  ongoing_cost_per_round: 300000
  benefits:
  - target: governance_quality
    boost: 0.25
  - target: value_investor_satisfaction
    boost: 0.12
  - target: esg_investor_satisfaction
    boost: 0.1
  - target: regulator_satisfaction
    boost: 0.12
    markets:
    - wa
    - sa
  - target: regulatory_event_probability_reduction
    boost: 0.1
  interactions:
  - condition:
      attribute: entry_mode_in_any_market
      operator: ==
      value: jv
    effect:
      type: jv_monitoring_cost
      magnitude: 100000
      per: jv_market
      description: Anti-corruption compliance monitoring required for each JV partner
  revocation_penalty:
    duration_rounds: 3
    investor_confidence_drop: -0.15
    regulator_penalty: -0.1
    regulatory_event_probability_increase: 0.08
    news_headline: dismantles anti-corruption program — regulatory scrutiny expected
  prerequisite:
  amplifier:
  display_order: 3
- code: supply_chain_audit
  name: Supply Chain Audit
  name_zh: 供应链审计
  description: |-
    Commission independent audits of your entire supply chain. Identifies cost inefficiencies but may expose reputational risks at contract manufacturing partners.
  description_zh: |-
    委托对整个供应链进行独立审计。可发现成本低效，但可能暴露合同制造合作伙伴的声誉风险。
  ongoing_cost_per_round: 250000
  benefits:
  - target: governance_quality
    boost: 0.15
  - target: cogs_reduction
    boost: 0.015
  - target: operations_effectiveness_boost
    boost: 0.05
  - target: esg_investor_satisfaction
    boost: 0.12
  - target: supply_chain_event_protection
    boost: 0.15
  interactions:
  - condition:
      attribute: uses_contract_manufacturing
      operator: ==
      value: true
    effect:
      type: contract_mfg_reputation_risk
      probability_per_round: 0.15
      impact:
        type: reputation_event
        magnitude: -0.08
        duration: 1
        description: Supply chain audit reveals labor concerns at contract manufacturer
      description: Audit may expose unfavorable conditions at contract manufacturing facilities
  revocation_penalty:
    duration_rounds: 2
    investor_confidence_drop: -0.08
    cogs_reduction_lost: true
    news_headline: cancels supply chain auditing — transparency concerns raised
  prerequisite:
  amplifier:
  display_order: 4
- code: public_esg_reporting
  name: Public ESG Reporting
  name_zh: 公开ESG报告
  description: |-
    Publish comprehensive quarterly ESG reports. Amplifies the visibility of all other ESG investments to stakeholders. But reporting without substance will be seen as greenwashing.
  description_zh: |-
    发布全面的季度ESG报告。放大所有其他ESG投资对利益相关者的可见度。但没有实质内容的报告将被视为漂绿行为。
  ongoing_cost_per_round: 100000
  benefits:
  - target: governance_quality
    boost: 0.1
  - target: esg_investor_satisfaction
    boost: 0.08
  - target: regulator_satisfaction
    boost: 0.05
  interactions:
  - condition:
      attribute: total_esg_investment
      operator: <
      value: 1000000
    effect:
      type: greenwashing_penalty
      impact:
        esg_investor_penalty: -0.2
        regulator_penalty: -0.08
        customer_trust_penalty: -0.03
      description: Public ESG reporting with minimal actual investment seen as greenwashing
  revocation_penalty:
    duration_rounds: 2
    investor_confidence_drop: -0.05
    esg_investor_extra_penalty: -0.1
    news_headline: stops publishing ESG reports — transparency regresses
  prerequisite:
  amplifier:
    target: esg_investment_visibility
    multiplier: 1.3
    description: All ESG investments produce 30% more stakeholder satisfaction with public reporting
  display_order: 5
tax_structures:
- code: direct
  name: Direct Structure
  name_zh: 直接结构
  description: |-
    Profits flow directly from each market subsidiary to headquarters. Simple, transparent, and fully compliant. No tax optimization but no audit risk. Regulators and ESG investors approve of the transparency.
  description_zh: |-
    利润从各市场子公司直接流向总部。简单、透明、完全合规。没有税务优化但没有审计风险。监管机构和ESG投资者认可其透明度。
  setup_cost: 0
  annual_maintenance_cost: 0
  effective_tax_reduction_pct: '0.00'
  repatriation_cost_reduction_pct: '0.00'
  audit_probability_per_round: '0.00'
  audit_penalty_multiplier: '1.0'
  value_investor_modifier: '0.03'
  esg_investor_modifier: '0.05'
  regulator_modifier: '0.05'
  anti_corruption_conflict: false
  display_order: 1
- code: regional_hub
  name: Regional Hub Structure
  name_zh: 区域枢纽结构
  description: |-
    Route profits through a regional holding entity in a favorable tax jurisdiction. Reduces effective tax rate and repatriation friction. Standard practice among multinationals — moderate audit risk. Requires ongoing legal and accounting infrastructure.
  description_zh: |-
    通过优惠税收管辖区的区域控股实体转移利润。降低有效税率和资金回流摩擦。跨国公司的标准做法——中等审计风险。需要持续的法律和会计基础设施。
  setup_cost: 2000000
  annual_maintenance_cost: 400000
  effective_tax_reduction_pct: '0.04'
  repatriation_cost_reduction_pct: '0.40'
  audit_probability_per_round: '0.06'
  audit_penalty_multiplier: '1.5'
  value_investor_modifier: '0.02'
  esg_investor_modifier: '-0.03'
  regulator_modifier: '-0.03'
  anti_corruption_conflict: false
  display_order: 2
- code: aggressive
  name: Aggressive Tax Optimization
  name_zh: 激进税务优化
  description: |-
    Maximize profit shifting through transfer pricing, IP licensing structures, and multi-layered holding entities. Significant tax savings but high audit risk, regulatory scrutiny, and reputational exposure. Creates visible conflict with Anti-Corruption and ESG governance commitments.
  description_zh: |-
    通过转让定价、知识产权授权结构和多层控股实体最大化利润转移。节税显著但审计风险高、监管审查严格且存在声誉风险。与反腐败和ESG治理承诺存在明显冲突。
  setup_cost: 4000000
  annual_maintenance_cost: 800000
  effective_tax_reduction_pct: '0.08'
  repatriation_cost_reduction_pct: '0.70'
  audit_probability_per_round: '0.15'
  audit_penalty_multiplier: '2.5'
  value_investor_modifier: '0.05'
  esg_investor_modifier: '-0.15'
  regulator_modifier: '-0.10'
  anti_corruption_conflict: true
  display_order: 3
communication_assignments:
- code: expansion_memo_r2
  name: 'Board Memo: International Expansion Strategy'
  name_zh: 董事会备忘录：国际扩张战略
  trigger_type: ROUND_MILESTONE
  trigger_condition:
    round: 2
  audience: BOARD
  prompt_text: |-
    Your board of directors has requested a brief memo outlining your international expansion strategy.

    You've completed two quarters as the leadership team of a clean energy battery technology company. The board wants to understand:
    - Which markets are you targeting and why?
    - What entry modes have you chosen and what's the rationale?
    - How are you managing the risks of operating in foreign battery markets (tariffs, FEOC compliance, local content requirements)?
    - What's your talent and localization strategy?
    - How does this expansion plan connect to your overall competitive strategy in the energy storage industry?

    Write a board memo (max 300 words) that justifies your international strategy. The board is sophisticated — they'll notice if your stated strategy contradicts your actual decisions.
  prompt_text_zh: |-
    您的董事会要求提交一份简要备忘录，概述您的国际扩张战略。

    作为清洁能源电池技术公司的领导团队，您已完成两个季度的运营。董事会希望了解：
    - 您瞄准了哪些市场，为什么？
    - 您选择了什么进入模式，理由是什么？
    - 您如何管理在外国电池市场运营的风险（关税、FEOC合规、本地含量要求）？
    - 您的人才和本地化策略是什么？
    - 该扩张计划如何与您在储能行业的整体竞争战略相联系？

    撰写一份董事会备忘录（最多300字），论证您的国际战略。董事会成员经验丰富——如果您的书面战略与实际决策相矛盾，他们会察觉。
  word_limit: 300
  evaluation_criteria:
  - criterion: strategic_consistency
    weight: 0.35
    description: Does the memo match the team's actual market entry decisions, talent allocation, and compliance investment?
  - criterion: stakeholder_awareness
    weight: 0.2
    description: 'Does it address board concerns: risk, ROI timeline, competitive positioning?'
  - criterion: clarity_and_persuasion
    weight: 0.2
    description: Is the memo well-structured, concise, and convincing?
  - criterion: risk_acknowledgment
    weight: 0.15
    description: Does it acknowledge origin trust challenges, currency risk, and competitive threats?
  - criterion: framework_grounding
    weight: 0.1
    description: Does it reference relevant frameworks (CAGE distance, Uppsala model, OLI paradigm)?
  is_mandatory: true
  coherence_weight: '0.05'
  display_order: 1
- code: investor_letter_r4
  name: 'Investor Letter: Quarterly Strategy Update'
  name_zh: 投资者信函：季度战略更新
  trigger_type: ROUND_MILESTONE
  trigger_condition:
    round: 4
  audience: INVESTORS
  prompt_text: |-
    Your three major institutional investors — Velocity Capital (Growth), Granite Investments (Value), and GreenHorizon Partners (ESG) — expect a quarterly update letter.

    Each fund has different priorities. Your letter will be read by all three.

    Address:
    - How is your battery technology strategy performing against expectations?
    - What's your technology roadmap (Gen 2/3 progression in energy density, cycle life, safety)?
    - How are you managing financial health (debt, margins, dividends)?
    - What ESG commitments have you made and what returns are they generating?
    - What's your outlook for the next 4 quarters in the clean energy market?

    Write a shareholder letter (max 300 words). Remember: Velocity wants growth signals, Granite wants discipline signals, GreenHorizon wants sustainability signals. You can't optimize for all three — but you need to maintain confidence across the board.
  prompt_text_zh: |-
    您的三家主要机构投资者——高速资本（增长型）、磐石投资（价值型）和绿色地平线合伙人（ESG型）——期待收到季度更新信函。

    每只基金都有不同的优先事项。您的信函将被三方共同阅读。

    请涵盖：
    - 您的电池技术战略表现如何？
    - 您的技术路线图是什么（第二代/第三代在能量密度、循环寿命、安全性方面的进展）？
    - 您如何管理财务健康（债务、利润率、股息）？
    - 您做出了哪些ESG承诺，产生了什么回报？
    - 您对清洁能源市场未来4个季度的展望是什么？

    撰写一封股东信函（最多300字）。请记住：高速资本寻求增长信号，磐石投资寻求纪律信号，绿色地平线寻求可持续性信号。您无法同时满足三方——但需要维持全面的信心。
  word_limit: 300
  evaluation_criteria:
  - criterion: strategic_consistency
    weight: 0.3
    description: Does the letter match actual financial performance, R&D investment, and ESG commitments?
  - criterion: stakeholder_awareness
    weight: 0.3
    description: Does it address the specific concerns of all three investor archetypes?
  - criterion: clarity_and_persuasion
    weight: 0.2
    description: Is the letter professional, balanced, and confidence-inspiring?
  - criterion: risk_acknowledgment
    weight: 0.1
    description: Does it acknowledge challenges honestly rather than only highlighting positives?
  - criterion: framework_grounding
    weight: 0.1
    description: Does it reference strategic rationale grounded in frameworks or industry analysis?
  is_mandatory: true
  coherence_weight: '0.05'
  display_order: 2
- code: crisis_statement
  name: 'Press Statement: Crisis Response'
  name_zh: 新闻声明：危机应对
  trigger_type: EVENT_BASED
  trigger_condition:
    event_category:
    - GEOPOLITICAL
    - SANCTIONS
  audience: PUBLIC
  prompt_text: |-
    A major event has affected your battery operations: {event_name}.

    {event_description}

    The media is asking for a statement. Your customers, investors, regulators, and employees are watching.

    Draft a press statement (max 200 words) that:
    - Acknowledges the situation
    - Explains your response
    - Reassures stakeholders
    - Positions your clean energy company constructively

    Avoid empty platitudes. Stakeholders can see your actual decisions — if you claim to be 'committed to compliance' but your compliance investment is zero, they'll know.
  prompt_text_zh: |-
    一项重大事件影响了您的电池业务：{event_name}。

    {event_description}

    媒体正在要求发表声明。您的客户、投资者、监管机构和员工都在关注。

    起草一份新闻声明（最多200字），需要：
    - 承认情况
    - 解释您的应对
    - 安抚利益相关者
    - 建设性地定位您的清洁能源公司

    避免空洞的套话。利益相关者可以看到您的实际决策——如果您声称"致力于合规"但合规投资为零，他们会知道的。
  word_limit: 200
  evaluation_criteria:
  - criterion: strategic_consistency
    weight: 0.35
    description: Does the statement match the team's actual response to the event and their broader strategy?
  - criterion: stakeholder_awareness
    weight: 0.25
    description: Does it address the concerns of affected stakeholders (customers, regulators, investors)?
  - criterion: clarity_and_persuasion
    weight: 0.25
    description: Is the statement clear, professional, and appropriate in tone?
  - criterion: risk_acknowledgment
    weight: 0.15
    description: Does it acknowledge the impact honestly without being defensive?
  is_mandatory: false
  coherence_weight: '0.03'
  display_order: 10
- code: employee_message_r6
  name: 'Employee Town Hall: Global Operations Update'
  name_zh: 员工全体大会：全球运营更新
  trigger_type: ROUND_MILESTONE
  trigger_condition:
    round: 6
  audience: EMPLOYEES
  prompt_text: |-
    You're addressing your global workforce — headquartered in {home_market} with battery manufacturing and sales operations in {active_markets}.

    Employees are asking:
    - Is the company financially healthy?
    - Are jobs secure in each market?
    - What's the growth plan for our energy storage business?
    - How does the company's ESG commitment affect them?
    - If you've made governance commitments (pay transparency, board diversity), what do they mean for employees?

    Write a town hall message (max 250 words). Your workforce spans multiple cultures and markets. Some are at headquarters, some are recent local hires in foreign markets. They need to feel included and informed — not just managed.
  prompt_text_zh: |-
    您正在向全球员工发言——总部设在{home_market}，电池制造和销售业务遍及{active_markets}。

    员工们在问：
    - 公司财务健康吗？
    - 各市场的工作岗位安全吗？
    - 储能业务的增长计划是什么？
    - 公司的ESG承诺对他们意味着什么？
    - 如果您做出了治理承诺（薪酬透明、董事会多元化），对员工有什么影响？

    撰写一份全体大会致辞（最多250字）。您的员工遍布多个文化和市场。有些在总部，有些是外国市场的新近本地雇员。他们需要感到被包容和知情——而不仅仅是被管理。
  word_limit: 250
  evaluation_criteria:
  - criterion: strategic_consistency
    weight: 0.25
    description: Does the message align with actual talent decisions, salary levels, and localization investment?
  - criterion: stakeholder_awareness
    weight: 0.3
    description: Does it address employee concerns across different markets and roles?
  - criterion: clarity_and_persuasion
    weight: 0.2
    description: Is it authentic, inclusive, and motivating rather than corporate boilerplate?
  - criterion: risk_acknowledgment
    weight: 0.15
    description: Does it honestly address challenges the company is facing?
  - criterion: framework_grounding
    weight: 0.1
    description: Does it connect to organizational values and strategic direction?
  is_mandatory: true
  coherence_weight: '0.05'
  display_order: 3
- code: final_review_r8
  name: 'Board Presentation: 8-Quarter Strategic Review'
  name_zh: 董事会报告：8个季度战略回顾
  trigger_type: ROUND_MILESTONE
  trigger_condition:
    round: 8
  audience: BOARD
  prompt_text: |-
    This is your final quarterly board presentation. Looking back over 8 quarters of leadership in the clean energy battery technology sector:

    - What was your strategy and how did it evolve?
    - What worked and what didn't?
    - How did you navigate origin trust challenges, competitive dynamics, and market conditions?
    - What's the state of your global operations — financial health, market positions, stakeholder relationships?
    - If you had 4 more quarters, what would you do differently?

    Write your strategic review (max 400 words). This is your legacy document — it should demonstrate strategic thinking, honest self-assessment, and the ability to learn from results. The board has seen every number. They want to know if you understand WHY the numbers look the way they do.
  prompt_text_zh: |-
    这是您最后一次季度董事会报告。回顾清洁能源电池技术行业8个季度的领导历程：

    - 您的战略是什么？如何演变的？
    - 什么奏效了，什么没有？
    - 您如何应对原产地信任挑战、竞争态势和市场条件？
    - 您的全球业务现状如何——财务健康、市场地位、利益相关者关系？
    - 如果再给您4个季度，您会做什么不同的事？

    撰写您的战略回顾（最多400字）。这是您的总结文件——应当展现战略思维、诚实的自我评估和从结果中学习的能力。董事会看过每一个数字。他们想知道您是否理解数字背后的原因。
  word_limit: 400
  evaluation_criteria:
  - criterion: strategic_consistency
    weight: 0.25
    description: Does the review accurately reflect what happened and why?
  - criterion: stakeholder_awareness
    weight: 0.15
    description: Does it show awareness of all stakeholder perspectives?
  - criterion: clarity_and_persuasion
    weight: 0.2
    description: Is the review well-structured, insightful, and professionally written?
  - criterion: risk_acknowledgment
    weight: 0.2
    description: Does it honestly assess failures and missed opportunities?
  - criterion: framework_grounding
    weight: 0.2
    description: Does it demonstrate application of strategic frameworks to analyze outcomes?
  is_mandatory: true
  coherence_weight: '0.08'
  display_order: 4
org_structures:
- code: centralized
  name: Centralized
  name_zh: 集权式
  description: |-
    All strategic and operational decisions flow through headquarters. Fast decision-making and strong alignment, but local adaptation suffers as geographic scope increases. Works well for 1-2 markets, strains beyond 3.
  description_zh: |-
    所有战略和运营决策由总部统一制定。决策迅速、协调一致，但随地理范围扩大，本地适应性受限。适用于1-2个市场，超过3个则面临压力。
  base_overhead_per_round: '100000'
  per_market_coordination_cost: '50000'
  hq_talent_effectiveness_modifier: '1.15'
  local_talent_effectiveness_modifier: '0.80'
  innovation_modifier: '1.10'
  coordination_efficiency: '1.05'
  decision_speed_modifier: '1.10'
  optimal_market_range_min: 1
  optimal_market_range_max: 3
  overextension_cost_per_market: '200000'
  overextension_effectiveness_penalty: '0.08'
  transition_cost: '0'
  transition_disruption_rounds: 0
  display_order: 1
- code: regional
  name: Regional
  name_zh: 区域式
  description: |-
    Each region operates semi-autonomously with local leadership, budgets, and decision authority. Excellent local adaptation but risk of strategic fragmentation and duplication. Ideal for 3-5 markets.
  description_zh: |-
    每个区域拥有本地领导层、预算和决策权限的半自主运营。本地适应性优秀，但存在战略碎片化和重复建设风险。适用于3-5个市场。
  base_overhead_per_round: '300000'
  per_market_coordination_cost: '100000'
  hq_talent_effectiveness_modifier: '0.90'
  local_talent_effectiveness_modifier: '1.20'
  innovation_modifier: '0.90'
  coordination_efficiency: '0.85'
  decision_speed_modifier: '1.05'
  optimal_market_range_min: 3
  optimal_market_range_max: 5
  overextension_cost_per_market: '100000'
