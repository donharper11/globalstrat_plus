  name_zh: 第一代——标准锂离子电池（LFP/NMC）
  description: |-
    Current mainstream lithium-ion platform using LFP and NMC chemistries. Proven, cost-effective, widely deployed. Adequate for standard applications but limited energy density and cycle life constrain premium use cases.
  description_zh: |-
    当前主流锂离子平台，采用LFP和NMC化学体系。技术成熟、性价比高、广泛部署。适用于标准应用，但有限的能量密度和循环寿命制约了高端应用场景。
