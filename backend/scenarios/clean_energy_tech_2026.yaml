features:
  platform:
  - code: energy_density
    layer: platform
    name: Energy Density
    name_zh: 能量密度
    description: Wh/kg — how much energy the battery stores per unit weight. Critical for EV range and portable applications.
    description_zh: 每千克储存的能量（Wh/kg）。对电动汽车续航和便携式应用至关重要。
    category: Core Chemistry
    min_value: 0
    max_value: 20
    default_value: 1
    cost_curve_type: exponential
    cost_base: 200000
    time_lag_rounds: 1
    is_licensable: true
    license_cost_multiplier: '2.50'
    display_order: 1
  - code: cycle_life
    layer: platform
    name: Cycle Life
    name_zh: 循环寿命
    description: Number of charge-discharge cycles before degradation. Critical for grid storage and commercial fleet applications.
    description_zh: 充放电循环退化前的次数。对电网储能和商用车队应用至关重要。
    category: Core Chemistry
    min_value: 0
    max_value: 20
    default_value: 1
    cost_curve_type: exponential
    cost_base: 180000
    time_lag_rounds: 1
    is_licensable: true
    license_cost_multiplier: '2.50'
    display_order: 2
  - code: charging_speed
    layer: platform
    name: Charging Speed
    name_zh: 充电速度
    description: C-rate and fast-charging capability. Minutes-to-80% metric. Critical for EV consumer acceptance.
    description_zh: 倍率和快充能力。80%电量所需分钟数指标。对电动汽车消费者接受度至关重要。
    category: Performance
    min_value: 0
    max_value: 20
    default_value: 1
    cost_curve_type: exponential
    cost_base: 160000
    time_lag_rounds: 1
    is_licensable: true
    license_cost_multiplier: '2.50'
    display_order: 3
  - code: thermal_management
    layer: platform
    name: Thermal Management
    name_zh: 热管理
    description: Heat dissipation, thermal runaway prevention, operating temperature range. Safety-critical.
    description_zh: 散热、热失控预防、工作温度范围。安全关键技术。
    category: Safety & Reliability
    min_value: 0
    max_value: 20
    default_value: 1
    cost_curve_type: exponential
    cost_base: 190000
    time_lag_rounds: 1
    is_licensable: true
    license_cost_multiplier: '2.50'
    display_order: 4
  - code: safety_rating
    layer: platform
    name: Safety Rating
    name_zh: 安全评级
    description: Nail penetration, crush, overcharge, and short circuit test performance. Certification prerequisite.
    description_zh: 针刺、挤压、过充和短路测试性能。认证前提条件。
    category: Safety & Reliability
    min_value: 0
    max_value: 20
    default_value: 1
    cost_curve_type: exponential
    cost_base: 170000
    time_lag_rounds: 1
    is_licensable: true
    license_cost_multiplier: '2.00'
    display_order: 5
  - code: recyclability
    layer: platform
    name: Recyclability
    name_zh: 可回收性
    description: Design for disassembly, recycled content percentage, material recovery rate. EU Battery Regulation driver.
    description_zh: 拆解设计、回收材料含量比例、材料回收率。欧盟电池法规驱动因素。
    category: Sustainability
    min_value: 0
    max_value: 20
    default_value: 1
    cost_curve_type: diminishing
    cost_base: 140000
    time_lag_rounds: 1
    is_licensable: true
    license_cost_multiplier: '2.00'
    display_order: 6
  - code: solid_state
    layer: platform
    name: Solid-State Technology
    name_zh: 固态技术
    description: Solid electrolyte replacing liquid. Breakthrough in density and safety. The frontier technology.
    description_zh: 固态电解质取代液态电解质。密度和安全性的突破性技术。前沿科技。
    category: Advanced Chemistry
    min_value: 0
    max_value: 20
    default_value: 1
    cost_curve_type: exponential
    cost_base: 300000
    time_lag_rounds: 1
    is_licensable: true
    license_cost_multiplier: '3.00'
    display_order: 7
  - code: smart_bms
    layer: platform
    name: Smart Battery Management
    name_zh: 智能电池管理
    description: AI-driven charge optimization, predictive maintenance, digital twin monitoring, cloud connectivity.
    description_zh: AI驱动的充电优化、预测性维护、数字孪生监控、云端连接。
    category: Digital & Software
    min_value: 0
    max_value: 20
    default_value: 1
    cost_curve_type: exponential
    cost_base: 220000
    time_lag_rounds: 1
    is_licensable: true
    license_cost_multiplier: '3.00'
    display_order: 8
  - code: sodium_ion
    layer: platform
    name: Sodium-Ion Chemistry
    name_zh: 钠离子化学
    description: Alternative chemistry using abundant sodium instead of lithium. Lower cost, cold-weather performance, but lower density.
    description_zh: 使用丰富钠资源替代锂的替代化学体系。成本更低，低温性能更好，但能量密度较低。
    category: Alternative Chemistry
    min_value: 0
    max_value: 20
    default_value: 1
    cost_curve_type: exponential
    cost_base: 250000
    time_lag_rounds: 1
    is_licensable: true
    license_cost_multiplier: '2.50'
    display_order: 9
  marketing:
  - code: price_competitiveness
    layer: marketing
    name: Price Competitiveness
    name_zh: 价格竞争力
    description: How your price compares to market expectations for your positioning tier. Derived from your pricing decisions.
    description_zh: 您的价格与定位层级的市场预期相比如何。由定价决策决定。
    category: Pricing
    min_value: 0
    max_value: 20
    default_value: 5
    cost_curve_type: linear
    cost_base: 0
    time_lag_rounds: 0
    is_licensable: false
    license_cost_multiplier: '1.00'
    display_order: 10
  - code: promotion_reach
    layer: marketing
    name: Advertising & Promotion Reach
    name_zh: 广告与推广覆盖
    description: How effectively your marketing reaches target customers. Derived from promotion budget relative to market size.
    description_zh: 您的营销触达目标客户的效果如何。由促销预算相对于市场规模决定。
    category: Promotion
    min_value: 0
    max_value: 20
    default_value: 1
    cost_curve_type: linear
    cost_base: 0
    time_lag_rounds: 0
    is_licensable: false
    license_cost_multiplier: '1.00'
    display_order: 11
  - code: distribution_coverage
    layer: marketing
    name: Retail & Distribution Reach
    name_zh: 零售与分销覆盖
    description: How available your products are to customers. Derived from distribution strategy and investment.
    description_zh: 您的产品对客户的可获得性如何。由分销策略和投资决定。
    category: Distribution
    min_value: 0
    max_value: 20
    default_value: 1
    cost_curve_type: linear
    cost_base: 0
    time_lag_rounds: 0
    is_licensable: false
    license_cost_multiplier: '1.00'
    display_order: 12
  - code: brand_awareness
    layer: marketing
    name: Brand Recognition & Trust
    name_zh: 品牌知名度与信任
    description: How well known and trusted your brand is in each market. Builds cumulatively from promotion spend over multiple rounds.
    description_zh: 您的品牌在各市场的知名度和可信度如何。随多轮推广支出累积增长。
    category: Brand
    min_value: 0
    max_value: 20
    default_value: 1
    cost_curve_type: linear
    cost_base: 0
    time_lag_rounds: 0
    is_licensable: false
    license_cost_multiplier: '1.00'
    display_order: 13
  - code: product_availability
    layer: marketing
    name: Product Availability & Stock Levels
    name_zh: 产品可用性与库存水平
    description: |-
      Whether you have enough inventory to meet demand. Derived from production volume vs actual demand. Stockouts lose customers.
    description_zh: 您是否有足够库存满足需求。由产量与实际需求对比决定。缺货会流失客户。
    category: Supply
    min_value: 0
    max_value: 20
    default_value: 5
    cost_curve_type: linear
    cost_base: 0
    time_lag_rounds: 0
    is_licensable: false
    license_cost_multiplier: '1.00'
    display_order: 14
  strategy:
  - code: long_term_investment
    layer: strategy
    name: Long-Term Market Investment
    name_zh: 长期市场投资
    description: |-
      How committed you are to each market — capital deployed, infrastructure built, time horizon signaled. Derived from entry mode, plant investments, and cumulative spending.
    description_zh: 您对各市场的承诺程度——部署的资本、建设的基础设施、展示的时间跨度。由进入模式、工厂投资和累计支出决定。
    category: Market Commitment
    min_value: 0
    max_value: 20
    default_value: 1
    cost_curve_type: linear
    cost_base: 0
    time_lag_rounds: 0
    is_licensable: false
    license_cost_multiplier: '1.00'
    display_order: 20
  - code: debt_equity_cash
    layer: strategy
    name: Debt-to-Equity & Cash Reserves
    name_zh: 资产负债率与现金储备
    description: |-
      Your financial health — leverage ratio, cash position, and ability to weather downturns. Derived from financing decisions.
    description_zh: 您的财务健康状况——杠杆率、现金状况和抵御下行的能力。由融资决策决定。
    category: Financial Health
    min_value: 0
    max_value: 20
    default_value: 5
    cost_curve_type: linear
    cost_base: 0
    time_lag_rounds: 0
    is_licensable: false
    license_cost_multiplier: '1.00'
    display_order: 21
  - code: jv_distributor
    layer: strategy
    name: JV & Distributor Relationships
    name_zh: 合资与经销商关系
    description: |-
      Strength of your local partnerships — joint ventures, distributor agreements, and channel relationships. Derived from partnership decisions and investment levels.
    description_zh: 您的本地合作伙伴关系的强度——合资企业、经销商协议和渠道关系。由合作决策和投资水平决定。
    category: Partnerships
    min_value: 0
    max_value: 20
    default_value: 0
    cost_curve_type: linear
    cost_base: 0
    time_lag_rounds: 0
    is_licensable: false
    license_cost_multiplier: '1.00'
    display_order: 22
  - code: regulatory_govt
    layer: strategy
    name: Regulatory & Government Engagement
    name_zh: 监管与政府关系
    description: |-
      Your relationship with local regulators and government bodies. Affected by lobbying investment, compliance track record, and local manufacturing presence.
    description_zh: 您与当地监管机构和政府部门的关系。受游说投资、合规记录和本地制造存在的影响。
    category: Government Relations
    min_value: 0
    max_value: 20
    default_value: 0
    cost_curve_type: linear
    cost_base: 0
    time_lag_rounds: 0
    is_licensable: false
    license_cost_multiplier: '1.00'
    display_order: 23
  - code: esg_track_record
    layer: strategy
    name: Environmental & Social Responsibility Track Record
    name_zh: 环境与社会责任历史记录
    description: |-
      Your cumulative ESG performance — environmental investments, social programs, governance commitments. Builds over time, hard to fake.
    description_zh: 您的累积ESG表现——环境投资、社会项目、治理承诺。需长期积累，难以伪造。
    category: ESG
    min_value: 0
    max_value: 20
    default_value: 0
    cost_curve_type: linear
    cost_base: 0
    time_lag_rounds: 0
    is_licensable: false
    license_cost_multiplier: '1.00'
    display_order: 24
  - code: local_manufacturing
    layer: strategy
    name: Local Manufacturing & Job Creation
    name_zh: 本地制造与就业创造
    description: |-
      Whether you produce locally in each market. Regulators and communities reward firms that create local jobs and reduce import dependency.
    description_zh: 您是否在各市场进行本地生产。监管机构和社区奖励创造本地就业和减少进口依赖的企业。
    category: Operations
    min_value: 0
    max_value: 10
    default_value: 0
    cost_curve_type: linear
    cost_base: 0
    time_lag_rounds: 0
    is_licensable: false
    license_cost_multiplier: '1.00'
    display_order: 25
    is_derived: true
    is_market_specific: true
  - code: acquisition_track
    layer: strategy
    name: Growth Through Acquisition Track Record
    name_zh: 并购增长历史记录
    description: |-
      Your history of acquiring companies or assets to accelerate growth. Some investors reward aggressive acquisition strategies; others prefer organic growth.
    description_zh: 您通过收购公司或资产加速增长的历史。部分投资者青睐激进的并购策略，其他则偏好有机增长。
    category: Growth Strategy
    min_value: 0
    max_value: 20
    default_value: 0
    cost_curve_type: linear
    cost_base: 0
    time_lag_rounds: 0
    is_licensable: false
    license_cost_multiplier: '1.00'
    display_order: 26
  - code: rd_talent
    layer: strategy
    name: R&D Team Quality
    name_zh: 研发团队质量
    description: |-
      The caliber of your engineers, designers, and researchers. Higher quality means faster, cheaper feature development. Affected by salary, training investment, and retention.
    description_zh: 您的工程师、设计师和研究人员的水平。更高质量意味着更快、更低成本的功能开发。受薪资、培训投资和留存率影响。
    category: Talent & Workforce
    min_value: 1
    max_value: 20
    default_value: 3
    cost_curve_type: linear
    cost_base: 0
    time_lag_rounds: 0
    is_licensable: false
    license_cost_multiplier: '1.00'
    display_order: 30
  - code: commercial_talent
    layer: strategy
    name: Sales & Marketing Team Quality
    name_zh: 销售与市场团队质量
    description: |-
      The caliber of your marketing strategists, sales representatives, and business development team. Higher quality means more effective campaigns, better distribution partnerships, and stronger customer relationships.
    description_zh: 您的营销策略师、销售代表和业务拓展团队的水平。更高质量意味着更有效的营销活动、更好的分销合作和更强的客户关系。
    category: Talent & Workforce
    min_value: 1
    max_value: 20
    default_value: 3
    cost_curve_type: linear
    cost_base: 0
    time_lag_rounds: 0
    is_licensable: false
    license_cost_multiplier: '1.00'
    display_order: 31
  - code: operations_talent
    layer: strategy
    name: Operations & Supply Chain Team Quality
    name_zh: 运营与供应链团队质量
    description: |-
