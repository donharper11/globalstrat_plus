    Cutting-edge multi-chemistry platform combining solid-state lithium and sodium-ion cells. Full feature unlocks across all chemistries. The future of energy storage — but markets and supply chains may not be ready.
  description_zh: |-
    结合固态锂电池和钠离子电池的前沿多化学体系平台。全面解锁所有化学体系的功能。储能的未来——但市场和供应链可能尚未准备就绪。
