    tolerance: 2.5
  - feature_code: governance_quality
    feature_label: Governance Quality
    ideal_value: 7
    weight: 0.15
    tolerance: 2.0
- name: GreenHorizon Partners
  name_zh: 绿色地平线合伙人
  code: greenhorizon
  description: |-
    ESG-focused fund that allocates capital to clean energy companies with strong environmental commitment, social responsibility, and governance practices. They divest from firms with poor ESG track records.
  description_zh: |-
    专注ESG的基金，将资金配置给具有强大环境承诺、社会责任感和良好治理实践的企业。会撤出ESG记录不良的企业投资。
