markets:
- name: North America
  name_zh: 北美
  code: na
  description: |-
    The Inflation Reduction Act has triggered a battery manufacturing boom. $369B in climate spending is reshaping the energy supply chain. FEOC rules restrict Chinese battery content in vehicles qualifying for tax credits. Massive demand from EV manufacturers and grid-scale storage. The most lucrative market — but the highest regulatory barriers for East Asian firms.
  description_zh: |-
    《通胀削减法案》引发了电池制造业热潮。3690亿美元的气候支出正在重塑能源供应链。FEOC规则限制了在申请税收抵免的车辆中使用中国电池内容。电动汽车制造商和电网级储能的巨大需求。最有利可图的市场——但对东亚企业的监管壁垒最高。
  currency_code: USD
  exchange_rate_base: '1.0000'
  exchange_rate_volatility: '0.02'
  base_growth_rate: '0.08'
  entry_cost_base: 2000000
  tariff_rate: '0.00'
  tax_rate: '0.21'
  regulatory_difficulty: 7
  infrastructure_quality: 9
  base_manufacturing_cost: '1.2'
  allows_manufacturing: true
  plant_build_cost: 35000000
  plant_build_rounds: 3
  plant_capacity_units: 50000
  contract_mfg_available: true
  contract_mfg_cost_multiplier: '1.30'
  contract_mfg_capacity_cap: 30000
  display_order: 1
- name: East Asia
  name_zh: 东亚
  code: ea
  description: |-
    The world's largest battery market and manufacturing base. CATL, BYD, and EVE Energy dominate. Government subsidizes manufacturing capacity and controls critical mineral processing. Export controls on processing technology give EA firms a structural advantage. Fiercely competitive on cost.
  description_zh: |-
    全球最大的电池市场和制造基地。宁德时代、比亚迪和亿纬锂能占据主导地位。政府补贴制造产能并控制关键矿物加工。加工技术出口管制赋予东亚企业结构性优势。成本竞争极为激烈。
  currency_code: CNY
  exchange_rate_base: '0.1380'
  exchange_rate_volatility: '0.04'
  base_growth_rate: '0.10'
  entry_cost_base: 1500000
  tariff_rate: '0.08'
  tax_rate: '0.25'
  regulatory_difficulty: 6
  infrastructure_quality: 8
  base_manufacturing_cost: '0.8'
  allows_manufacturing: true
  plant_build_cost: 25000000
  plant_build_rounds: 2
  plant_capacity_units: 80000
  contract_mfg_available: true
  contract_mfg_cost_multiplier: '1.10'
  contract_mfg_capacity_cap: 50000
  display_order: 2
- name: Western Europe
  name_zh: 西欧
  code: eu
  description: |-
    The EU Battery Regulation mandates carbon footprint declarations, recycled content minimums, and battery passports. Strictest ESG requirements globally. Northvolt, BASF, and Umicore are building European supply chains. Anti-subsidy investigations targeting Chinese battery imports. Premium pricing for certified, sustainable batteries.
  description_zh: |-
    欧盟电池法规要求碳足迹申报、回收材料最低含量和电池护照。全球最严格的ESG要求。Northvolt、巴斯夫和优美科正在构建欧洲供应链。针对中国电池进口的反补贴调查。经认证的可持续电池可获得溢价。
  currency_code: EUR
  exchange_rate_base: '1.0800'
  exchange_rate_volatility: '0.02'
  base_growth_rate: '0.07'
  entry_cost_base: 2500000
  tariff_rate: '0.06'
  tax_rate: '0.22'
  regulatory_difficulty: 9
  infrastructure_quality: 9
  base_manufacturing_cost: '1.3'
  allows_manufacturing: true
  plant_build_cost: 40000000
  plant_build_rounds: 3
  plant_capacity_units: 40000
  contract_mfg_available: true
  contract_mfg_cost_multiplier: '1.40'
  contract_mfg_capacity_cap: 25000
  display_order: 3
- name: South America
  name_zh: 南美
  code: sa
  description: |-
    Chile and Argentina hold the lithium triangle — critical raw materials for battery production. Brazil's growing solar and wind installations drive energy storage demand. Government incentivizes local battery assembly through tariffs and tax zones. Complex tax system. Nationalization risk on lithium mining rights.
  description_zh: |-
    智利和阿根廷拥有锂三角——电池生产的关键原材料。巴西日益增长的太阳能和风能装机推动储能需求。政府通过关税和税收优惠区激励本地电池组装。税制复杂。锂矿开采权存在国有化风险。
  currency_code: BRL
  exchange_rate_base: '0.1700'
  exchange_rate_volatility: '0.05'
  base_growth_rate: '0.09'
  entry_cost_base: 1200000
  tariff_rate: '0.18'
  tax_rate: '0.34'
  regulatory_difficulty: 5
  infrastructure_quality: 5
  base_manufacturing_cost: '0.9'
  allows_manufacturing: true
  plant_build_cost: 22000000
  plant_build_rounds: 2
  plant_capacity_units: 35000
  contract_mfg_available: true
  contract_mfg_cost_multiplier: '1.20'
  contract_mfg_capacity_cap: 20000
  display_order: 4
- name: West Africa
  name_zh: 西非
  code: wa
  description: |-
    130 million Nigerians lack reliable electricity. Off-grid solar and battery storage is the fastest-growing energy segment in Africa. Demand is massive but price sensitivity is extreme. Government offers incentives for local energy manufacturing. Distribution requires navigating informal market networks. The highest-growth market with the highest operational friction.
  description_zh: |-
    1.3亿尼日利亚人缺乏可靠电力供应。离网太阳能和电池储能是非洲增长最快的能源板块。需求巨大但价格敏感度极高。政府为本地能源制造提供激励。分销需要驾驭非正规市场网络。增长最快的市场，运营摩擦也最大。
  currency_code: NGN
  exchange_rate_base: '0.00063'
  exchange_rate_volatility: '0.08'
