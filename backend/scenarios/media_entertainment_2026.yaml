ai_investor_funds:
- name: Velocity Capital
  name_zh: 高速资本
  code: velocity
  description: |-
    Growth-focused fund that invests in media companies demonstrating strong subscriber growth, aggressive content investment, and international expansion. They accept short-term losses if the audience trajectory is compelling.
  description_zh: |-
    专注增长的基金，投资于展现强劲营业收入增长、积极研发投入和国际扩张的企业。如果增长轨迹令人信服，可接受短期亏损。
  investment_philosophy: growth
  initial_holding_pct: '0.10'
  max_holding_pct: '0.20'
  min_holding_pct: '0.02'
  trade_aggressiveness: '0.35'
  profile:
    fund_type: Growth Fund
    fund_type_zh: 增长型基金
    strategy_summary: |-
      Aggressive growth investing. Backs media companies that invest in content, expand into new markets, and pursue subscriber growth over short-term profitability.
    strategy_summary_zh: |-
      激进增长投资。支持那些投资创新、拓展新市场、以营业收入增长优先于短期盈利的企业。
    dislikes:
    - label: Stagnant subscribers
    - label: Low content spending
    - label: Single-market focus
    - label: Technology dependency
  preferences:
  - feature_code: revenue_growth_rate
    feature_label: Revenue Growth Rate
    ideal_value: 8
    weight: 0.25
    tolerance: 2.5
  - feature_code: rd_intensity
    feature_label: Content Investment as % of Revenue
    ideal_value: 7
    weight: 0.2
    tolerance: 2.5
  - feature_code: market_expansion
    feature_label: Market Presence Breadth
    ideal_value: 8
    weight: 0.15
    tolerance: 3.0
  - feature_code: talent_rd_quality
    feature_label: Creative Talent Quality
    ideal_value: 7
    weight: 0.15
    tolerance: 2.0
  - feature_code: platform_generation
    feature_label: Technology Generation
    ideal_value: 8
    weight: 0.1
    tolerance: 2.5
  - feature_code: revenue_scale
    feature_label: Revenue Scale
    ideal_value: 7
    weight: 0.15
    tolerance: 3.0
- name: Granite Investments
  name_zh: 磐石投资
  code: granite
  description: |-
    Value-oriented fund that prioritizes subscriber retention, controlled content spending, low leverage, and consistent shareholder returns. They avoid media companies with unsustainable content arms races.
  description_zh: |-
    价值导向型基金，优先考虑财务纪律、健康利润率、低杠杆和持续的股东回报。回避以激进举债驱动增长的公司。
  investment_philosophy: value
  initial_holding_pct: '0.10'
  max_holding_pct: '0.18'
  min_holding_pct: '0.03'
  trade_aggressiveness: '0.25'
  profile:
    fund_type: Value Fund
    fund_type_zh: 价值型基金
    strategy_summary: |-
      Conservative value investing. Seeks financially disciplined media companies with strong governance, healthy margins, and consistent shareholder returns.
    strategy_summary_zh: |-
      保守价值投资。寻找财务纪律严明、治理健全、利润率健康且股东回报持续的企业。
    dislikes:
    - label: High leverage
    - label: Volatile earnings
    - label: No dividend policy
    - label: Weak governance
    - label: Cash burn
  preferences:
  - feature_code: financial_leverage_inv
    feature_label: Financial Prudence (Low Debt)
    ideal_value: 8
    weight: 0.25
    tolerance: 2.0
  - feature_code: dividend_consistency
    feature_label: Dividend Yield
    ideal_value: 6
    weight: 0.18
    tolerance: 3.0
  - feature_code: net_margin_score
    feature_label: Net Profit Margin
    ideal_value: 7
    weight: 0.2
    tolerance: 2.5
  - feature_code: cash_runway_score
    feature_label: Cash Stability
    ideal_value: 8
    weight: 0.12
    tolerance: 2.5
  - feature_code: talent_operations_quality
    feature_label: Operations Efficiency
    ideal_value: 6
    weight: 0.1
    tolerance: 2.5
  - feature_code: governance_quality
    feature_label: Governance Quality
    ideal_value: 7
    weight: 0.15
    tolerance: 2.0
- name: GreenHorizon Partners
  name_zh: 绿色地平线合伙人
  code: greenhorizon
  description: |-
    ESG-focused fund that allocates capital to media companies demonstrating content diversity, responsible AI practices, strong governance, and positive cultural impact. They divest from firms with poor ESG track records.
  description_zh: |-
    专注ESG的基金，将资金配置给具有强大环境承诺、社会责任感和良好治理实践的企业。会撤出ESG记录不良的企业投资。
  investment_philosophy: esg
  initial_holding_pct: '0.10'
  max_holding_pct: '0.20'
  min_holding_pct: '0.02'
  trade_aggressiveness: '0.30'
  profile:
    fund_type: ESG Fund
    fund_type_zh: ESG基金
    strategy_summary: |-
      Impact-focused ESG investing. Backs media companies demonstrating genuine commitment to content diversity, responsible AI, and governance quality.
    strategy_summary_zh: |-
      影响力导向的ESG投资。支持在环境可持续性、社会责任和治理质量方面展现真正承诺的企业。
    dislikes:
    - label: ESG neglect
    - label: Weak governance
    - label: AI ethics violations
    - label: No social investment
