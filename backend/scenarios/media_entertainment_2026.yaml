markets:
- name: North America
  name_zh: 北美
  code: na
  description: |-
    Mature, saturated streaming market with the highest ARPU globally. Netflix, Disney+, and Amazon dominate. Content spending arms race. Cord-cutting complete. Premium subscribers willing to pay for quality originals but churn is high. FCC regulation is moderate. $45B total market. Growth 3%.
  description_zh: |-
    全球最大的流媒体和娱乐市场。Netflix、Disney+和YouTube主导。内容创作人才集中。广告技术领先。消费者对内容质量要求高。版权保护体系成熟。好莱坞仍是全球内容引擎。
  currency_code: USD
  exchange_rate_base: '1.0000'
  exchange_rate_volatility: '0.02'
  base_growth_rate: '0.03'
  entry_cost_base: 2000000
  tariff_rate: '0.00'
  tax_rate: '0.21'
  regulatory_difficulty: 5
  infrastructure_quality: 10
  base_manufacturing_cost: '1.0'
  allows_manufacturing: true
  plant_build_cost: 15000000
  plant_build_rounds: 2
  plant_capacity_units: 80000
  contract_mfg_available: true
  contract_mfg_cost_multiplier: '1.20'
  contract_mfg_capacity_cap: 50000
  display_order: 1
- name: East Asia
  name_zh: 东亚
  code: ea
  description: |-
    Massive market but the most heavily censored content environment globally. All content must pass NRTA review. Douyin, Tencent Video, and Bilibili dominate. Foreign content severely restricted. Short-form video is dominant format. Content Safety & Compliance is MANDATORY for market access. Growth 8%.
  description_zh: |-
    全球最大的游戏市场和增长最快的流媒体市场。本土平台强势——抖音、B站、爱奇艺。内容审查要求严格。文化出口能力强（K-pop、动漫、网文）。用户付费意愿提升中。
  currency_code: CNY
  exchange_rate_base: '0.1380'
  exchange_rate_volatility: '0.04'
  base_growth_rate: '0.08'
  entry_cost_base: 1500000
  tariff_rate: '0.10'
  tax_rate: '0.25'
  regulatory_difficulty: 9
  infrastructure_quality: 8
  base_manufacturing_cost: '0.7'
  allows_manufacturing: true
  plant_build_cost: 12000000
  plant_build_rounds: 2
  plant_capacity_units: 100000
  contract_mfg_available: true
  contract_mfg_cost_multiplier: '1.10'
  contract_mfg_capacity_cap: 60000
  display_order: 2
- name: Western Europe
  name_zh: 西欧
  code: eu
  description: |-
    Fragmented by language with 24+ language markets. EU Digital Services Act and AVMSD mandate 30% European content quotas. GDPR restricts personalization algorithms. Privacy-conscious consumers. Strong public broadcasters. Premium content commands loyalty. Growth 4%.
  description_zh: |-
    成熟的媒体市场，强调文化多样性和本地内容。欧盟数字服务法和视听媒体服务指令设定市场规则。公共广播传统强大。多语言市场需要深度本地化。版权法规严格。
  currency_code: EUR
  exchange_rate_base: '1.0800'
  exchange_rate_volatility: '0.02'
  base_growth_rate: '0.04'
  entry_cost_base: 2500000
  tariff_rate: '0.05'
  tax_rate: '0.22'
  regulatory_difficulty: 7
  infrastructure_quality: 9
  base_manufacturing_cost: '1.2'
  allows_manufacturing: true
  plant_build_cost: 20000000
  plant_build_rounds: 2
  plant_capacity_units: 60000
  contract_mfg_available: true
  contract_mfg_cost_multiplier: '1.30'
  contract_mfg_capacity_cap: 40000
  display_order: 3
- name: South America
  name_zh: 南美
  code: sa
  description: |-
    Portuguese-language dominated market (Brazil). Globo dominance in broadcast. Growing streaming adoption driven by smartphone penetration. Telenovela culture means strong local content preference. ANCINE film agency oversees quotas. Currency volatility affects subscription pricing. Growth 7%.
  description_zh: |-
    拉丁美洲流媒体市场快速增长。葡萄牙语和西班牙语内容需求大。电信运营商捆绑销售是重要渠道。价格敏感但对本地内容热情高。广告支持的免费模式受欢迎。
  currency_code: BRL
  exchange_rate_base: '0.1700'
  exchange_rate_volatility: '0.05'
  base_growth_rate: '0.07'
  entry_cost_base: 1200000
  tariff_rate: '0.12'
  tax_rate: '0.34'
  regulatory_difficulty: 5
  infrastructure_quality: 6
  base_manufacturing_cost: '0.8'
  allows_manufacturing: true
  plant_build_cost: 10000000
  plant_build_rounds: 2
  plant_capacity_units: 50000
  contract_mfg_available: true
  contract_mfg_cost_multiplier: '1.15'
  contract_mfg_capacity_cap: 30000
  display_order: 4
- name: West Africa
  name_zh: 西非
  code: wa
  description: |-
    Nollywood is the world's 2nd largest film industry by volume. Mobile-first consumption dominates — data costs limit streaming quality. Massive youth population hungry for content. Local creators are cultural powerhouses. Distribution requires mobile-optimized delivery. Highest growth market (15%) with highest operational friction.
  description_zh: |-
    非洲娱乐产业中心——尼莱坞是全球第二大电影产业。移动优先的内容消费。数据成本限制流媒体发展。本地内容有巨大需求。音乐产业（Afrobeats）全球影响力上升。
  currency_code: NGN
  exchange_rate_base: '0.00063'
