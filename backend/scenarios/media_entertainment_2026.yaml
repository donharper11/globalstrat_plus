  name_zh: 第一代——传统媒体平台
  description: |-
    Current mainstream streaming and linear content platform. Reliable delivery, broad content library, standard recommendation engine. Adequate for mass market and premium subscribers but limited for interactive and AI-powered experiences.
  description_zh: |-
    标准流媒体和内容分发平台。技术成熟，适用于基本的视频点播和直播服务。功能上限制约了互动和沉浸式体验。
