entry_modes:
- code: export
  name: Export from Home Market
  name_zh: 从母国市场出口
  description: |-
    Ship products from your existing North American operations. Lowest commitment, fastest to start, but highest logistics costs and full tariff exposure.
  description_zh: |-
    从您现有的业务发货。承诺最低，启动最快，但物流成本最高且完全承担关税。
  capital_requirement: 500000
  setup_rounds: 0
  control_level: 3
  risk_level: 2
  local_presence_score: 1
  logistics_cost_multiplier: '2.00'
  tariff_applies: true
- code: licensing
  name: Technology Licensing Agreement
  name_zh: 技术许可协议
  description: |-
    License your technology and brand to a local manufacturer. Low cost, but you lose control over quality and pricing. Partner earns most of the margin.
  description_zh: |-
    将您的技术和品牌授权给本地制造商或运营商。成本低，但您将失去对质量和定价的控制。合作伙伴获取大部分利润。
  capital_requirement: 1000000
  setup_rounds: 1
  control_level: 2
  risk_level: 3
  local_presence_score: 3
  logistics_cost_multiplier: '1.10'
  tariff_applies: false
- code: joint_venture
  name: Joint Venture with Local Partner
  name_zh: 与本地合作伙伴成立合资企业
  description: |-
    Partner with a local firm to share operations, costs, and market knowledge. Moderate capital, good local relationships, but shared profits and potential partner conflicts.
  description_zh: |-
    与本地企业合作共享运营、成本和市场知识。中等资本要求，良好的本地关系，但利润共享且存在潜在合作伙伴冲突。
  capital_requirement: 8000000
  setup_rounds: 1
  control_level: 5
  risk_level: 5
  local_presence_score: 7
  logistics_cost_multiplier: '1.20'
  tariff_applies: false
- code: acquisition
  name: Acquire Local Company
  name_zh: 收购本地公司
  description: |-
    Buy an existing local player for instant market access, customer base, and operations. Highest capital cost, but immediate presence and full control.
  description_zh: |-
    收购现有本地企业以获得即时市场准入、客户基础和运营能力。资本成本最高，但可立即建立存在并获得完全控制权。
  capital_requirement: 20000000
  setup_rounds: 0
  control_level: 9
  risk_level: 7
  local_presence_score: 8
  logistics_cost_multiplier: '1.05'
  tariff_applies: false
- code: subsidiary
  name: Build Wholly-Owned Subsidiary
  name_zh: 建立全资子公司
  description: |-
    Establish your own operations from scratch. Full control, full costs, full risk. Takes time to set up but provides maximum strategic flexibility long-term.
