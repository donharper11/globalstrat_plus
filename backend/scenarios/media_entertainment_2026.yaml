scenario:
  name: Global Media & Entertainment 2026
  name_zh: 全球媒体与娱乐 2026
  industry_label: Global Media & Entertainment
  industry_label_zh: 媒体与娱乐
  description: |-
    Lead the executive team of a mid-size global media and entertainment company. Content is your asset — not factories. Navigate fragmented audiences, censorship walls, local content quotas, and AI-driven disruption across 5 global markets. Build streaming platforms, acquire IP, localize content, and compete with algorithm-driven rivals. Over 10 rounds (each representing one quarter), develop your content portfolio, expand internationally, and earn the confidence of subscribers, investors, and regulators.
  description_zh: |-
    管理一家全球媒体与娱乐公司，涵盖流媒体内容、互动娱乐和数字媒体平台。在AI生成内容、版权监管、文化本地化和平台经济的变革中导航。与AI竞争对手展开较量，赢得机构投资者、政府机构和全球观众在5个市场中的信任。
  num_rounds: 10
  round_duration_label: Quarter
  round_duration_label_zh: 季度
  starting_cash: '45000000.00'
  currency_code: USD
  max_platforms_per_team: 3
  max_products_per_platform: 3
  max_products_total: 6
  performance_index_base: '55.00'
  is_active: true
  company_names:
    - Lumina Studios
    - Vantage Media
    - Nexus Content
    - Aether Entertainment
    - Solaris Pictures
    - Helix Streaming
    - Prism Media Group
    - Zenith Creative
    - Eclipse Networks
    - Parallax Studios
    - Nova Digital Media
    - Cipher Entertainment
    - Meridian Productions
    - Catalyst Content
    - Vertex Broadcasting
    - Stratos Media
