    description: App store depth, cloud storage, cross-platform sync, and developer ecosystem richness.
    description_zh: 应用商店深度、云存储、跨平台同步和开发者生态丰富度。
    category: Software & Services
    min_value: 0
    max_value: 20
    default_value: 1
    cost_curve_type: exponential
    cost_base: 130000
    time_lag_rounds: 1
    is_licensable: true
    license_cost_multiplier: '3.00'
