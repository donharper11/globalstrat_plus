scenario:
  name: Consumer Electronics 2026
  name_zh: 消费电子 2026
  industry_label: Consumer Electronics
  industry_label_zh: 消费电子
  description: |-
    You are the executive team of a mid-size consumer electronics company headquartered in North America. Your firm has a solid domestic presence with two established product lines, but the board is pushing for international expansion. Three global markets await — each with different customer preferences, regulatory environments, and competitive dynamics. Over 10 rounds (each representing one quarter), you must develop your technology platform, launch products, enter new markets, and build a sustainable global business. Your competitors are doing the same.
  description_zh: |-
    管理一家全球消费电子公司，设计、制造和销售智能手机、可穿戴设备和智能家居产品。在快速技术迭代、激烈价格竞争和复杂全球供应链中导航。与AI竞争对手展开较量，赢得机构投资者、政府机构和消费者在5个全球市场中的信任。
  num_rounds: 10
  round_duration_label: Quarter
  round_duration_label_zh: 季度
  starting_cash: '50000000.00'
  currency_code: USD
  max_platforms_per_team: 3
  max_products_per_platform: 3
  max_products_total: 6
  performance_index_base: '55.00'
  is_active: true
  company_names:
    - Apex Devices
    - Vertex Electronics
    - Prism Tech
    - Helix Digital
    - Solaris Consumer
    - Cipher Systems
    - Quantum Edge
    - Nova Circuit
    - Zenith Hardware
    - Stratos Electronics
    - Lumen Devices
    - Titan Micro
    - Eclipse Gadgets
    - Photon Labs
    - Meridian Tech
    - Cobalt Innovations
