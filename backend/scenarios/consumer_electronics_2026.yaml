    name: Brand Recognition & Trust
    name_zh: 品牌知名度与信任
    description: How well known and trusted your brand is in each market. Builds cumulatively from promotion spend over multiple rounds.
    description_zh: 您的品牌在各市场的知名度和可信度如何。随多轮推广支出累积增长。
    category: Brand
