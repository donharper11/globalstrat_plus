features:
  platform:
  - code: processing_power
    layer: platform
    name: Processing Power
    name_zh: 处理器性能
    description: |-
      Raw computing speed, multitasking capability, and benchmark scores. Higher levels mean faster processors and smoother performance.
    description_zh: 原始计算速度、多任务处理能力和基准测试分数。更高等级意味着更快的处理器和更流畅的性能。
    category: Core Technology
    min_value: 0
    max_value: 20
    default_value: 1
    cost_curve_type: diminishing
    cost_base: 150000
    time_lag_rounds: 1
    is_licensable: true
    license_cost_multiplier: '2.50'
    display_order: 1
  - code: battery_life
    layer: platform
    name: Battery Life
    name_zh: 电池续航
    description: Hours of use per charge, fast charging capability, and thermal management. Critical for mobile-first markets.
    description_zh: 每次充电的使用时长、快充能力和散热管理。对移动优先市场至关重要。
    category: Core Technology
    min_value: 0
    max_value: 20
    default_value: 1
    cost_curve_type: diminishing
    cost_base: 120000
    time_lag_rounds: 1
    is_licensable: true
    license_cost_multiplier: '2.50'
    display_order: 2
  - code: durability
    layer: platform
    name: Durability
    name_zh: 耐用性
    description: Drop resistance, scratch-proof glass, metal vs plastic chassis. Critical for enterprise and rugged use cases.
    description_zh: 抗摔、防刮玻璃、金属与塑料机身。对企业和户外使用场景至关重要。
    category: Core Technology
    min_value: 0
    max_value: 20
    default_value: 1
    cost_curve_type: diminishing
    cost_base: 100000
    time_lag_rounds: 1
    is_licensable: true
    license_cost_multiplier: '2.00'
