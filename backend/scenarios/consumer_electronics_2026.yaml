    min_value: 0
    max_value: 20
    default_value: 1
    cost_curve_type: exponential
    cost_base: 180000
    time_lag_rounds: 1
    is_licensable: true
    license_cost_multiplier: '3.00'
    display_order: 5
  - code: product_design
    layer: platform
    name: Product Design
    name_zh: 产品设计
    description: Physical aesthetics, form factor, color options, and packaging quality. The "unboxing moment" and daily usage pleasure.
    description_zh: 外观美学、外形因素、颜色选择和包装质量。开箱体验和日常使用愉悦感。
