      How committed you are to each market — capital deployed, infrastructure built, time horizon signaled. Derived from entry mode, plant investments, and cumulative spending.
    description_zh: 您对各市场的承诺程度——部署的资本、建设的基础设施、展示的时间跨度。由进入模式、工厂投资和累计支出决定。
