  code: APAC
  description: |-
    High-growth, price-sensitive market with massive volume potential. Manufacturing hub with low production costs. Strong tech adoption among urban consumers, but rural penetration is challenging. Regulatory complexity is high.
  description_zh: |-
    高增长、价格敏感的市场，拥有巨大的销量潜力。制造中心，生产成本低。城市消费者技术采纳度高，但农村渗透具有挑战性。监管复杂度高。
