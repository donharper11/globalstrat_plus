  code: NA
  description: |-
    Mature, high-income market. Strong brand loyalty, premium segment is large, but growth is slow. High infrastructure quality, moderate regulation. Your home market.
  description_zh: |-
    成熟的高收入市场。品牌忠诚度高，高端细分市场大，但增长缓慢。基础设施质量高，监管适度。您的母国市场。
