  name_zh: 西欧
  code: EU
  description: |-
    Affluent, sustainability-conscious market. Strong premium segment, growing ESG regulation, and demanding environmental standards. High infrastructure but expensive operations. No local manufacturing — all imports.
  description_zh: |-
    富裕且注重可持续性的市场。高端细分市场强大，ESG法规不断加强，环保标准严格。基础设施优质但运营成本高。没有本地制造——全部进口。
