- name: South America
  name_zh: 南美
  code: LATAM
  description: |-
    Large, urbanized middle-income market with a growing middle class. High taxation and bureaucratic complexity offset lower labor costs. Strong domestic consumer culture and brand awareness, but currency volatility and import duties make pricing strategy critical. Manufacturing is viable via free trade zones.
  description_zh: |-
    大型城市化中等收入市场，中产阶级不断壮大。高税负和官僚复杂性抵消了较低的劳动力成本。强大的本国消费文化和品牌意识，但货币波动和进口关税使定价策略至关重要。通过自由贸易区制造可行。
