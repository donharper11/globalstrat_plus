- name: Africa
  name_zh: 非洲
  code: AFR
  description: |-
    High-growth, price-sensitive market with enormous volume potential. Young demographics and rapid mobile adoption drive demand, but infrastructure gaps and regulatory fragmentation create operational challenges. Local manufacturing is emerging but constrained. The value segment dominates.
  description_zh: |-
    高增长、价格敏感的市场，拥有巨大的销量潜力。年轻人口和快速的移动设备普及推动需求，但基础设施差距和监管碎片化带来运营挑战。本地制造正在兴起但受到限制。价值市场占主导地位。
