    name: Product Availability & Stock Levels
    name_zh: 产品可用性与库存水平
    description: |-
      Whether you have enough inventory to meet demand. Derived from production volume vs actual demand. Stockouts lose customers.
    description_zh: 您是否有足够库存满足需求。由产量与实际需求对比决定。缺货会流失客户。
