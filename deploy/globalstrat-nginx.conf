server {
    listen 80;
    server_name globalstrat.camdani.com;

    root /var/www/globalstrat/build;
    index index.html;

    # Serve React app — all non-API routes go to index.html (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls through FRP tunnel to homelab Django
    location /api/ {
        proxy_pass http://127.0.0.1:3006;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
    }

    # Static files caching
    location /static/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Cache JS/CSS/images aggressively (fingerprinted by React build)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    access_log /var/log/nginx/globalstrat.access.log;
    error_log /var/log/nginx/globalstrat.error.log;
}
